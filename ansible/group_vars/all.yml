---
# Domains for which to issue Let's Encrypt certs. Keep in sync with the
# files symlinked into nginx/sites-enabled/ — only enabled sites should be
# listed here (otherwise the cert is issued but nginx never serves the
# domain). Read by env.j2 → init_letsencrypt.sh.
domains:
  - www.blitzblit.com
  - blitzblit.com
  - msx-digitizer.blitzblit.com
  - msx-digitizer-gallery.blitzblit.com
  - pong.blitzblit.com
  - video-downloader.blitzblit.com

# Let's Encrypt registration email (expiry warnings, account recovery only).
acme_email: admin@blitzblit.com

# Shared docker network. App repos join this with `external: true`.
shared_network: blitzblit-net

# Site root on the server.
site_root: "/home/{{ ansible_user }}/sites/blitzblit-master"
