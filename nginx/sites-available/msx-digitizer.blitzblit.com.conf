server {
    server_name msx-digitizer.blitzblit.com;
    listen 80;
    listen [::]:80;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    server_name msx-digitizer.blitzblit.com;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/msx-digitizer.blitzblit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msx-digitizer.blitzblit.com/privkey.pem;

    # Deferred upstream resolution so this block doesn't crash master nginx
    # at startup if the digitizer frontend isn't on blitzblit-net yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Image uploads up to 200 MB.
    client_max_body_size 200M;
    client_body_timeout  600s;
    proxy_read_timeout   600s;

    # Forwards everything (static React shell + /api + /sessions) to the
    # digitizer repo's internal nginx, which owns its own routing.
    # `msx-digitizer-frontend` is a network alias on blitzblit-net (set in
    # that repo's docker-compose.yml) — disambiguates from the gallery's
    # `frontend` service which also lives on this network.
    location / {
        set $upstream http://msx-digitizer-frontend:80;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
