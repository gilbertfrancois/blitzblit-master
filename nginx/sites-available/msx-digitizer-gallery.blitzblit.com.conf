server {
    server_name msx-digitizer-gallery.blitzblit.com;
    listen 80;
    listen [::]:80;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    server_name msx-digitizer-gallery.blitzblit.com;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/msx-digitizer-gallery.blitzblit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msx-digitizer-gallery.blitzblit.com/privkey.pem;

    # Deferred upstream resolution so this block doesn't crash master nginx
    # at startup if the gallery frontend isn't on blitzblit-net yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Static-only site — keep caching modest for the React shell.
    # `msx-digitizer-gallery-frontend` is a network alias on blitzblit-net
    # (set in that repo's docker-compose.yml).
    location / {
        set $upstream http://msx-digitizer-gallery-frontend:80;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
