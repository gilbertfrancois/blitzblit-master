server {
    server_name pong.blitzblit.com;
    listen 80;
    listen [::]:80;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    server_name pong.blitzblit.com;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/pong.blitzblit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pong.blitzblit.com/privkey.pem;

    # Deferred upstream resolution so this block doesn't crash master nginx
    # at startup if the retro-tennis frontend isn't on blitzblit-net yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # `retro-tennis-frontend` is a network alias on blitzblit-net
    # (set in retro-tennis/docker-compose.yml).
    location / {
        set $upstream http://retro-tennis-frontend:80;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
