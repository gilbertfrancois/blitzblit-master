# Stub for movie-downloader.blitzblit.com. Upstream `movie-downloader:80`
# joins blitzblit-net once its own repo gets a docker-compose. Until then this
# conf is fine to keep — master returns 502 for that hostname only.

server {
    server_name movie-downloader.blitzblit.com;
    listen 80;
    listen [::]:80;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    server_name movie-downloader.blitzblit.com;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/movie-downloader.blitzblit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/movie-downloader.blitzblit.com/privkey.pem;

    # Deferred upstream resolution so this block doesn't crash master nginx
    # at startup if the movie-downloader container isn't on blitzblit-net yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 200M;
    client_body_timeout  600s;
    proxy_read_timeout   600s;

    location / {
        set $upstream http://movie-downloader:80;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
