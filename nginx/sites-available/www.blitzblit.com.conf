# Stub for the main www.blitzblit.com Flask site.
#
# Expects a service named `blitzblit-com` listening on port 80 on blitzblit-net.
# That repo will get its own docker-compose in a future deploy; this conf can
# stay in place — master nginx will just return 502 until the upstream exists.

server {
    server_name www.blitzblit.com blitzblit.com;
    listen 80;
    listen [::]:80;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://www.blitzblit.com$request_uri; }
}

server {
    server_name www.blitzblit.com;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/www.blitzblit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.blitzblit.com/privkey.pem;

    # Deferred upstream resolution so this block doesn't crash master nginx
    # at startup if the blitzblit-com container isn't on blitzblit-net yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream http://blitzblit-com:80;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Apex blitzblit.com → redirect to www.blitzblit.com
server {
    server_name blitzblit.com;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/blitzblit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blitzblit.com/privkey.pem;

    return 301 https://www.blitzblit.com$request_uri;
}
