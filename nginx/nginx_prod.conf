user nginx;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings (Mozilla intermediate)
    ##
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    ##
    # Logging Settings
    ##
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    ##
    # Gzip Settings
    ##
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/octet-stream;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;

    ##
    # Per-site configs (Debian-style split). Files live in sites-available/;
    # only those symlinked into sites-enabled/ are actually loaded.
    #
    # Enable:  ln -s ../sites-available/<domain>.conf nginx/sites-enabled/
    # Disable: rm nginx/sites-enabled/<domain>.conf
    # New:     copy sites-available/_template.conf.example, then enable.
    ##
    include /etc/nginx/sites-enabled/*.conf;
}
